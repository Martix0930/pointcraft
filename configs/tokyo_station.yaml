# Data config for the M1 deterministic baseline run (scripts/tokyo_station.py).
#
# Paths resolve relative to this config's folder. Large data now lives under the
# git-ignored data/ tree (moved out of Download/ and 三维GIS/). CLI flags
# (--las / --lod2 / --out / --name) override these values.

name: tokyo_station
crs: "EPSG:6677"        # both LAS and LOD2 are in this CRS (no reprojection)
cell_size: 1.0          # meters per voxel / block

# Aerial LiDAR tile(s). 60 full tiles now sit in data/raw/lidar/ (09LDxxxx.las);
# this single tile reproduces the original M0 Tokyo-Station run. See
# data/raw/tile_alignment.csv for which LAS covers which mesh.
las:
  - "../data/raw/lidar/09LD1874.las"

# M0 target source = CityGML (D5). The LOD2 grids covering 09LD1874 are
# 53394610/611/620/621; semantics (roof/facade/ground) come from the surface
# types. Delivered in EPSG:6697 and reprojected to 6677 by pointcraft.data.citygml.
citygml_tiles:
  - "../data/raw/citygml/udx/bldg/53394610_bldg_6697_2_op.gml"
  - "../data/raw/citygml/udx/bldg/53394611_bldg_6697_2_op.gml"
  - "../data/raw/citygml/udx/bldg/53394620_bldg_6697_2_op.gml"
  - "../data/raw/citygml/udx/bldg/53394621_bldg_6697_2_op.gml"

# OBJ LOD2 textured-mesh tile directories (data/raw/lod2/, 9 grids 53394600–622).
# Retained only as the --target obj FALLBACK / comparison path (pre-D5).
lod2_tiles:
  - "../data/raw/lod2/53394611"
  - "../data/raw/lod2/53394621"

# Output directory (relative to repo root unless absolute).
output_dir: "output"
