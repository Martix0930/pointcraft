# Data config for the M1 deterministic baseline run (scripts/tokyo_station.py).
#
# NOTE: `las` and `lod2_tiles` are absolute paths to LARGE local datasets that
# live OUTSIDE the repo and are NOT committed (see docs/07_GOTCHAS.md). They are
# machine-specific — edit them for your environment. CLI flags (--las / --lod2 /
# --out / --name) override these values.

name: tokyo_station
crs: "EPSG:6677"        # both LAS and LOD2 are in this CRS (no reprojection)
cell_size: 1.0          # meters per voxel / block

# Aerial LiDAR tile(s). One original tile; LOD2 supplies full building geometry.
las:
  - "D:/Desktop/实习/三维GIS/09LD1874.las"

# PLATEAU LOD2 textured-mesh tile directories.
lod2_tiles:
  - "D:/Desktop/实习/三维GIS/LOD2/53394611"
  - "D:/Desktop/实习/三维GIS/LOD2/53394621"

# Output directory (relative to repo root unless absolute).
output_dir: "output"
